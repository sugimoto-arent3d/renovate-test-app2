name: CI

on:
  pull_request:
  push:
    branches:
      - "main"
  workflow_dispatch:

permissions: {}
defaults:
  run:
    shell: bash
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci-checks:
    uses: ./.github/workflows/_ci-checks.yml
    with:
      all: ${{ github.event_name != 'pull_request' }}
    permissions:
      contents: read
      pull-requests: read

  status-check:
    runs-on: ubuntu-24.04
    needs: ci-checks
    if: ${{ failure() || cancelled() }}
    timeout-minutes: 1
    permissions: {}
    steps:
      - run: exit 1
