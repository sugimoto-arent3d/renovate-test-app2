name: CI-workflows

on:
  workflow_call:

permissions: {}
defaults:
  run:
    shell: bash
env:
  AQUA_VERSION: v2.48.1

jobs:
  actionlint:
    runs-on: ubuntu-slim
    timeout-minutes: 1

    permissions:
      contents: read

    steps:
      - run: cat "$GITHUB_EVENT_PATH"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # workflow_changed フィルターと整合（aqua.yaml は root 直下なので cone mode で自動取得）
          sparse-checkout: |
            .github/workflows
          sparse-checkout-cone-mode: true

      - uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
        with:
          aqua_version: ${{ env.AQUA_VERSION }}

      - name: Run actionlint
        run: |
          # gh-aw が生成するファイルは共通のヘッダーコメントで判定して除外する（ファイル名は当てにしない。
          # 例: *.lock.yml だけでなく agentics-maintenance.yml のような名前も生成され得る）
          files=()
          for f in .github/workflows/*.yml; do
            grep -q '^# This file was automatically generated by' "$f" || files+=("$f")
          done
          actionlint -color -oneline "${files[@]}"

  ghalint:
    runs-on: ubuntu-slim
    timeout-minutes: 1

    permissions:
      contents: read

    steps:
      - run: cat "$GITHUB_EVENT_PATH"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # workflow_changed フィルターと整合（aqua.yaml は root 直下なので cone mode で自動取得）
          sparse-checkout: |
            .github/workflows
          sparse-checkout-cone-mode: true

      - uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
        with:
          aqua_version: ${{ env.AQUA_VERSION }}

      - name: Run ghalint
        run: |
          # gh-aw が生成するファイルは ghalint 側で除外設定できないため一時的に退避する。
          # ファイル名ではなく生成ファイル共通のヘッダーコメントで判定する（*.lock.yml 以外の名前でも生成され得るため）。
          generated_files=()
          for f in .github/workflows/*.yml; do
            grep -q '^# This file was automatically generated by' "$f" && generated_files+=("$f")
          done
          for f in "${generated_files[@]}"; do mv "$f" "$f.bak"; done
          ghalint run
          status=$?
          for f in "${generated_files[@]}"; do mv "$f.bak" "$f"; done
          exit $status